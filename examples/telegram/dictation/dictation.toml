# dictation bot configuration
#
# The bot is Telegram-only: all inference runs on a dasllama-server instance. Start the
# server first with BOTH models in ITS config (model = the instruct LLM GGUF, asr = the
# whisper/parakeet ggml .bin). The bot reads this file from next to its executable, or
# from --config <path>.

# dasllama-server base URL. The server must be running and have an ASR model loaded
# (asr = in the SERVER's config), or the bot exits at startup with a clear error.
server = "http://127.0.0.1:8080"

# Telegram bot token from @BotFather. Leave empty to read TELEGRAM_BOT_TOKEN from the environment.
bot_token = ""

# The dictation system prompt. {language} is replaced with the detected language of each message.
# Edit freely and restart the bot — no rebuild needed. Remove the whole key to use the
# built-in default (this text).
dictation_prompt = '''
You are a dictation editor. You receive a raw speech-to-text transcript of a voice message. It is full of filler words, false starts, repetitions, mumbling and recognition errors. Its main language is "{language}", but the speaker may switch languages mid-message. Write in the SAME language(s) the speaker used — keep every part in its original language and NEVER translate any part into another language.

Clean it up into an easy-to-read message. Rules:
- Keep the speaker's OWN words and phrasing. Only rewrite parts that are garbled, disfluent or genuinely hard to read; leave clear sentences as they are, just fixing punctuation and casing.
- Do NOT paraphrase, rephrase or restate sentences that are already understandable, and do NOT summarize or shorten the content.
- Break the text into several short paragraphs, roughly one per topic or thought, separated by a blank line. Never return one long block of text.
- Drop filler words, false starts, repetitions and mumbling. If a fragment is unintelligible, leave it out rather than guessing.
- Fix obvious speech-recognition errors when the intended word is clear from context.
- Keep the speaker's meaning, tone and register — including slang and strong language.
- Do not add a summary, a title, opinions, or facts the speaker did not express. Output only the cleaned message text.
'''

# ASR language hint. "auto" detects the language of each message (recommended for RU+EN).
language = "auto"

# Reply-token budget for the LLM cleanup step (a longer voice note needs more).
max_tokens = 2048

# LLM sampling temperature. 0 = greedy (most faithful to the transcript).
temp = 0.0

# Seconds to wait for speech recognition, including time queued behind bulk ASR imports.
asr_timeout = 900

# Seconds to wait for the LLM cleanup response (a long note at low tok/s needs headroom).
llm_timeout = 900

# ffmpeg executable — on PATH, or an absolute path. Used to transcode OGG/Opus voice notes to WAV.
ffmpeg = "ffmpeg"

# getUpdates long-poll timeout, seconds.
poll_timeout = 30

# Log file path. Leave empty to write dictation.log next to the executable.
log_file = ""

# Log level: trace | debug | info | warning | error | critical.
log_level = "info"

# Skip the LLM cleanup when the transcript is this short (bytes) or less — 0 skips only empty
# transcripts; 8 also drops the ASR's short silence hallucinations ("you", ".", …). Note bytes,
# so Cyrillic counts ~2 per character.
min_chars = 8

# Archive every received audio file here (original format). Empty = don't keep any audio (default).
# The directory is created if missing; files are named <unixdate>_<senderid>_<telegram-name>.
keep_audio_dir = ""

# Local conversation database. Relative paths resolve next to the executable. Migrations are applied
# automatically; history is retained indefinitely.
database = "cadmus.db"

# Cadmus's conversational identity. This prompt is separate from dictation_prompt so personality
# never changes how transcripts are repaired.
assistant_name = "Cadmus"
assistant_aliases = "cadmus,кадмус,Кадмус,КАДМУС"

# Conversational answers are opt-in. Transcription always stays enabled; /help and /summary still
# work when this is false. When true, Cadmus answers a leading @bot username or wake name, replies
# to real assistant answers, and private-chat messages. Mentions later in a message are ignored, as
# are replies to transcript-delivery messages.
reply_when_mentioned = false

# Optional public @username for this chat. Leave empty for private groups/channels; Cadmus then
# builds Telegram's t.me/c/<channel>/<message> links from the -100... chat ID.
history_chat_username = ""

assistant_prompt = '''
You are Cadmus, the resident conversational aide and archivist of this chat.

You are a man of few words. Answer as briefly as possible, usually in one or two short sentences.
Give more detail only when explicitly asked. Be understated and dryly warm. Match the language of
the person addressing you, including language switches.

Treat recorded conversation as fallible evidence. Distinguish what participants actually said from
your own inference. Never invent missing history or imply that you saw messages outside the supplied
chat record. If the answer is unsupported, say so plainly.

When summarizing, prioritize decisions, conclusions, unresolved questions, commitments, and
meaningful changes of opinion. Avoid a mechanical message-by-message recap unless requested.
Attribute statements when that matters. A little wit is welcome; forced jokes are not.
'''

# Generation/tool limits. These do not delete or truncate on-disk history.
assistant_max_tokens = 4096
assistant_temp = 0.2
recent_messages = 40
# Maximum user-message matches returned by the current-chat FTS5 search tool.
history_search_results = 12
# Comma-separated languages used to generate independent strict FTS query variants.
history_search_languages = "ru,en"

# Public web search through Brave Search API. The API key is read only from
# BRAVE_SEARCH_API_KEY; it is never stored in this file or sent to the LLM.
web_search_enabled = true
web_search_results = 5
web_search_timeout = 15
web_search_max_calls = 2

summary_chunk_messages = 80
summary_max_messages = 4000
